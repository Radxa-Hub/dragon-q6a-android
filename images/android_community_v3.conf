# Boot Loader Specification type#1 entry — Android 13 on Dragon Q6A
title      Android 13 — Dragon Q6A
linux      /Android/Image
initrd     /Android/ramdisk.img
devicetree /Android/qcs6490-radxa-dragon-q6a.dtb
# Universal cmdline — works with any HDMI display (the kernel reads the connected
# display's EDID). For a panel that ships a bad/empty EDID, append
# drm.edid_firmware=HDMI-A-1:edid/<name>.bin and place the blob on the ESP under
# Android/edid/. rt_group_sched=0 disarms an RT_GROUP_SCHED abort-loop (needed for BT).
options    initcall_blacklist=simpledrm_platform_driver_init console=tty0 console=ttyMSM0,115200n8 earlycon=qcom_geni,0x00994000 fbcon=nodefer video=HDMI-A-1:e keep_bootcon ignore_loglevel loglevel=8 modprobe.blacklist=msm panic=10 coherent_pool=2M firmware_class.path=/vendor/firmware aic_load_fw_usb.aic_fw_path=/metadata/aic8800_fw/USB/aic8800D80 irqchip.gicv3_pseudo_nmi=0 psi=1 selinux=1 androidboot.force_normal_boot=1 androidboot.slot_suffix=_a androidboot.hardware=dragon_q6a androidboot.selinux=permissive androidboot.boot_devices=soc@0/8804000.mmc lsm=landlock,lockdown,yama,integrity,selinux,bpf rt_group_sched=0 printk.devkmsg=on
